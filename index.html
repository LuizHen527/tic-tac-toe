<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css">
    <title>Tic tac toe</title>
  </head>
  <body>
    <header>
      <div>
        <img src="" alt="" />
        <div>
          <span>You</span>
          <span>Points: 0</span>
        </div>
      </div>

      <h1>Tic Tac Toe</h1>

      <div>
        <img src="" alt="" />
        <div>
          <span>You</span>
          <span>Points: 0</span>
        </div>
      </div>
    </header>

    <main>
      <div class="board">
        <div id="0-0" class="board__cell">
            <img class="img-svg x-simbol" src="" alt="">
        </div>
        <div id="0-1" class="board__cell">
            <img class="img-svg o-simbol" src="" alt="">
        </div>
        <div id="0-2" class="board__cell">
            <img class="img-svg" src="" alt="">
        </div>

        <div id="1-0" class="board__cell">
            <img class="img-svg" src="" alt="">
        </div>
        <div id="1-1" class="board__cell">
            <img class="img-svg" src="" alt="">
        </div>
        <div id="1-2" class="board__cell">
            <img class="img-svg" src="" alt="">
        </div>

        <div id="2-0" class="board__cell">
            <img class="img-svg" src="" alt="">
        </div>
        <div id="2-1" class="board__cell">
            <img class="img-svg" src="" alt="">
        </div>
        <div id="2-2" class="board__cell">
            <img class="img-svg" src="" alt="">
        </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
