<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <title>Tic tac toe</title>
  </head>
  <body>
    <header>
      <div class="header__div">
        <div>
          <img
            class="profile-pic"
            src="./assets/generic-profile-picture.png"
            alt=""
          />
          <div>
            <span>You</span>
            <span id="points-player">Points: 0</span>
          </div>
        </div>
        <h1>Tic Tac Toe</h1>
        <div>
          <img
            class="profile-pic"
            src="./assets/generic-profile-picture.png"
            alt=""
          />
          <div>
            <span>AI</span>
            <span id="points-ai">Points: 0</span>
          </div>
        </div>
      </div>
    </header>

    <main>
      <p id="game-status">Your turn...</p>
      <div class="board">
        <div id="0-0" class="board__cell">
          <img class="img-svg" src="" alt="" />
        </div>
        <div id="0-1" class="board__cell">
          <img class="img-svg" src="" alt="" />
        </div>
        <div id="0-2" class="board__cell">
          <img class="img-svg" src="" alt="" />
        </div>

        <div id="1-0" class="board__cell">
          <img class="img-svg" src="" alt="" />
        </div>
        <div id="1-1" class="board__cell">
          <img class="img-svg" src="" alt="" />
        </div>
        <div id="1-2" class="board__cell">
          <img class="img-svg" src="" alt="" />
        </div>

        <div id="2-0" class="board__cell">
          <img class="img-svg" src="" alt="" />
        </div>
        <div id="2-1" class="board__cell">
          <img class="img-svg" src="" alt="" />
        </div>
        <div id="2-2" class="board__cell">
          <img class="img-svg" src="" alt="" />
        </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
